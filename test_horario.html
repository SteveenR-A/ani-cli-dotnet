							data: [null,{type:"data",data:{user:null},uses:{dependencies:["https://animeav1.com/auth"]}},{type:"data",data:{media:[{id:3833,title:"Steel Ball Run: JoJo no Kimyou na Bouken",synopsis:"En el Viejo Oeste Americano, la mayor carrera del mundo está a punto de comenzar. Miles de personas se alinean en San Diego para recorrer más de seis mil kilómetros por la oportunidad de ganar el gran premio de cincuenta millones de dólares. Con la era del caballo llegando a su fin, se permite a los concursantes usar cualquier tipo de vehículo que deseen. Los competidores tendrán que soportar condiciones agotadoras, viajando hasta cien kilómetros al día a través de desiertos inexplorados. La Steel Ball Run es, sin duda, un evento único en su tipo.\n\nEl joven Johnny Joestar, un ex corredor de caballos discapacitado, ha venido a San Diego para presenciar el inicio de la carrera. Allí se encuentra con Gyro Zeppeli, un corredor que lleva dos bolas de acero en la cintura en lugar de un arma. Johnny observa cómo Gyro utiliza una de sus bolas de acero para desatar un poder fantástico, obligando a un hombre a dispararse a sí mismo durante un duelo. En medio de la acción, Johnny toca accidentalmente la bola de acero y siente un poder surgiendo a través de sus piernas, lo que le permite levantarse por primera vez en dos años. Prometiendo encontrar el secreto de las bolas de acero, Johnny decide participar en la carrera, y así comienza su extraña aventura a través de América en la Steel Ball Run. ",poster:null,slug:"steel-ball-run-jojo-no-kimyou-na-bouken",startDate:"2026-03-19",createdAt:"2026-03-19 12:24:04.841667+00",category:{id:3,name:"OVA"},latestEpisode:{id:53160,number:1,createdAt:"2026-03-19T12:31:39.994708+00:00"}},{id:4342,title:"Heroine? Seijo? Iie, All Works Maid desu (Hokori)!",synopsis:"\"¡Me convertiré en la sirvienta más maravillosa del mundo!\" gritó la chica, con su falda ondeando en blanco y negro. Su nombre es Melody. Una chica japonesa reencarnada, ahora persigue su sueño en su nueva vida, trabajando como sirvienta multifuncional para la familia de un pobre conde en el reino de Théolas. Cuando ella lo logra, incluso el té barato se convierte en una bebida de lujo, y una mansión en ruinas se restaura rápidamente a su esplendor. Limpiar, servir, cazar, bricolaje—déjaselo todo a ella y a su poderosa magia.\n\nSin que Melody lo sepa, este mundo es en realidad un juego otome, y ella es la heroína más poderosa e invencible, ¡la santa! Sin embargo, ella sigue ignorando este hecho. ¿Romance con hombres guapos? ¿Ataques del Señor Demonio? ¡El trabajo es lo primero! ¡Una fantasía de trabajo malentendido que sin querer rompe el destino!",poster:null,slug:"heroine-seijo-iie-all-works-maid-desu-hokori",startDate:"2026-06-24",createdAt:"2026-06-24 15:02:09.655885+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59134,number:1,createdAt:"2026-06-24T15:06:36.104003+00:00"}},{id:4350,title:"Rakudai Kenja no Gakuin Musou: Nidome no Tensei, S-Rank Cheat Majutsushi Boukenroku",synopsis:"El Sabio del Viento, Ephtal, es un humano reencarnado, proveniente de la Tierra moderna. Reencarnado en un nuevo mundo donde la magia es real, decide dedicar toda su vida a la búsqueda de la magia. Sin embargo, a pesar de sus esfuerzos, descubre que no tiene absolutamente ningún talento para la magia y expira por última vez en la angustia.\n\n¡Pero aún no es el final para él! Se reencarna una vez más con el mismo nombre, Ephtal, 400 años después. Habiendo retenido su conocimiento y poder, fortalece su determinación y, nuevamente, fija su objetivo en la cima de la magia.\n\nSin embargo, en un giro sorprendente de los acontecimientos, descubre que la magia ha disminuido terriblemente. En esta era donde los poderosos hechizos son una rareza, su yo sin talento ahora es completamente inigualable. ¡Desde las profundidades de la impotencia hasta la cima del poder, el viaje del mago sin talento pero incomparable hacia la cima comienza ahora! ",poster:null,slug:"rakudai-kenja-no-gakuin-musou-nidome-no-tensei-s-rank-cheat-majutsushi-boukenroku",startDate:"2026-06-26",createdAt:"2026-06-25 13:47:53.214569+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59216,number:1,createdAt:"2026-06-25T15:19:32.74114+00:00"}},{id:3977,title:"Kami no Shizuku",synopsis:"Shizuku Kanzaki es el único hijo del renombrado crítico de vino Yutaka Kanzaki. Desde joven, Shizuku ha estado sujeto a una extraña educación por parte de su padre, todo por el bien del vino. Desde aprender a decantar una bebida con gracia hasta recordar intensamente el olor de cinturones de cuero y lápices, el entrenamiento le genera rencor hacia todo lo relacionado con el vino. Descontento con su padre, deja el hogar para convertirse en un representante de ventas promedio en una empresa de cerveza, negándose a tocar el vino nuevamente.\n\nCuando su padre fallece de repente, Shizuku se ve arrastrado de nuevo al mundo que tanto odia. Como parte de la voluntad de su padre, quien heredará su valiosa colección de vinos y su propiedad será la persona que pueda identificar correctamente a los \"12 Apóstoles\" de los vinos, así como las legendarias \"Gotas de Dios\". Para heredar los bienes, Shizuku tiene un año para completar la tarea, pero considera la propuesta ridícula, ya que es el único pariente vivo de Yutaka.\n\nLo que Yutaka no le dijo a su hijo antes de morir es que había adoptado a Issei Tomine en la familia una semana antes de su fallecimiento. Issei es un famoso crítico de vino veterano que compite contra Shizuku para reclamar la propiedad para sí mismo. Sin una formación formal en cata de vinos, Shizuku no tiene ninguna oportunidad contra \"El Príncipe del Vino\" y corre el riesgo de perderlo todo en esta competencia. ¿Podrá identificar correctamente las esquivas \"Gotas de Dios\" antes de que se le acabe el tiempo?",poster:null,slug:"kami-no-shizuku",startDate:"2026-04-10",createdAt:"2026-04-10 12:25:11.184459+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59293,number:12,createdAt:"2026-06-26T15:45:05.746475+00:00"}},{id:3957,title:"Marriagetoxin",synopsis:"Durante siglos, los Maestros del Veneno han perfeccionado el arte del asesinato. Entre ellos, la familia Gero se erige como una de las cinco familias más poderosas de los Maestros, ostentando una habilidad e influencia incomparables. Hikaru Gero, heredero de esta infame línea de sangre, ha vivido su vida sumido en las sombras del inframundo, alejado del amor o el matrimonio.\n\nSin embargo, para asegurar que la línea de sangre de los Maestros del Veneno no se extinga, el cabeza de la familia Gero declara que la hermana de Hikaru deberá ser forzada a tener un heredero. Poco después, Hikaru se cruza en el camino de Mei Kinosaki, una brillante estafadora matrimonial que, además, es su actual objetivo de asesinato. Decidido a proteger a su hermana y resolver el problema de sucesión por sí mismo, Hikaru hace una solicitud inesperada en el momento: pide a Mei que le ayude a casarse.\n\n“…Es la primera vez que alguien propone de esa manera.”\n\nY así, con la astuta estafadora matrimonial Mei como su consejera, el élite asesino Hikaru se embarca en la misión más dura por amor. ¿Su objetivo? El matrimonio definitivo. ¡El dúo más improbable—un asesino y una estafadora matrimonial—enfrentándose a la misión más difícil del mundo por amor! ",poster:null,slug:"marriagetoxin",startDate:"2026-04-07",createdAt:"2026-04-07 13:00:04.08733+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59043,number:12,createdAt:"2026-06-23T14:51:18.769747+00:00"}},{id:4367,title:"Neko to Ryuu",synopsis:"En lo profundo del bosque donde habitan bestias feroces y criaturas mágicas, una gata acoge a un dragón bebé huérfano como si fuera uno de los suyos.",poster:null,slug:"neko-to-ryuu",startDate:"2026-07-04",createdAt:"2026-06-27 14:46:37.918036+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59378,number:1,createdAt:"2026-06-27T14:51:33.891482+00:00"}},{id:197,title:"One Piece",synopsis:"Apenas sobreviviendo en un barril tras pasar por un terrible remolino en el mar, el despreocupado Monkey D. Luffy termina a bordo de un barco bajo ataque de temibles piratas. A pesar de parecer un adolescente ingenuo, no se le debe subestimar. Inigualable en combate, Luffy es un pirata que persigue resueltamente el codiciado tesoro de One Piece y el título de Rey de los Piratas que lo acompaña.\n\nEl difunto Rey de los Piratas, Gol D. Roger, agitou al mundo antes de su muerte al revelar la ubicación de su tesoro y desafiar a todos a conseguirlo. Desde entonces, innumerables poderosos piratas han navegado por mares peligrosos en busca del preciado One Piece, solo para nunca regresar. Aunque Luffy carece de una tripulación y de un barco adecuado, posee una habilidad sobrehumana y un espíritu indomable que lo convierten no solo en un formidable adversario, sino también en una inspiración para muchos.\n\nMientras enfrenta numerosos desafíos con una gran sonrisa en su rostro, Luffy reúne compañeros únicos para unirse a él en su ambicioso empeño, abrazando juntos los peligros y maravillas en su aventura única en la vida. ",poster:null,slug:"one-piece",startDate:"1999-10-20",createdAt:"2025-02-22 07:34:09.266305+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59388,number:1168,createdAt:"2026-06-28T16:36:21.024418+00:00"}},{id:3918,title:"Koori no Jouheki",synopsis:"Inepta para tratar con las personas, Koyuki Hikawa mantiene una barrera entre ella y los demás. Pasa su tiempo en la escuela secundaria alejada de otros, completamente sola. Al menos hasta que se encuentra con Minato Amamiya, quien sigue acortando la distancia entre ellos por alguna razón. La distante Koyuki, la popular Miki, el sin límites Minato y el relajado y amable miembro del equipo de baloncesto Youta. Esta es la historia de estos cuatro algo complicados y su fascinante y torpe juventud.",poster:null,slug:"koori-no-jouheki",startDate:"2026-04-02",createdAt:"2026-04-02 15:56:52.601047+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59229,number:13,createdAt:"2026-06-25T15:59:47.535596+00:00"}},{id:3926,title:"Tensei shitara Slime Datta Ken 4th Season",synopsis:"El sueño del Señor Demonio Rimuru de crear una alianza entre humanos y monstruos da un paso más hacia su realización. A medida que Tempest continúa prosperando, Granville Rozzo y su nieta, Maribel Rozzo, chocan con el Señor Demonio Rimuru por su plan de proteger a la humanidad gobernando sobre ella. Mientras tanto, en El Dorado, el Señor Demonio Leon trabaja hacia sus propios objetivos. ¡El despertar de un nuevo Héroe se acerca! ",poster:null,slug:"tensei-shitara-slime-datta-ken-4th-season",startDate:"2026-04-03",createdAt:"2026-04-03 13:47:27.175119+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59279,number:12,createdAt:"2026-06-26T15:11:34.824418+00:00"}},{id:3928,title:"Honzuki no Gekokujou: Shisho ni Naru Tame ni wa Shudan wo Erandeiraremasen - Ryoushu no Youjo",synopsis:"Adaptación de anime de la tercera parte de la novela ligera Honzuki no Gekokujou.",poster:null,slug:"honzuki-no-gekokujou-shisho-ni-naru-tame-ni-wa-shudan-wo-erandeiraremasen-ryoushu-no-youjo",startDate:"2026-04-04",createdAt:"2026-04-04 11:32:13.231925+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59375,number:12,createdAt:"2026-06-27T10:51:55.787989+00:00"}},{id:3929,title:"Mairimashita! Iruma-kun 4th Season",synopsis:"Cuarta temporada de Mairimashita! Iruma-kun.",poster:null,slug:"mairimashita-iruma-kun-4th-season",startDate:"2026-04-04",createdAt:"2026-04-04 11:34:50.908578+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59376,number:13,createdAt:"2026-06-27T10:52:32.231326+00:00"}},{id:3935,title:"Mao",synopsis:"Nanoka atraviesa un portal hacia la era Taisho, donde el exorcista Mao, a regañadientes, la rescata de las garras de un grotesco yokai. Cuando Nanoka regresa al presente, descubre que tiene algunas nuevas y increíbles habilidades. Regresa al pasado en busca de respuestas, solo para verse envuelta en la investigación de Mao sobre una serie de asesinatos espeluznantes. A medida que sus preguntas sobre sí misma se multiplican, Nanoka descubre que Mao está maldito por un demonio gato llamado Byoki, y también lo está su espada. Si alguien que no sea Mao intenta empuñarla, está condenado. Pero cuando la vida de Mao está en peligro, ¡Nanoka toma su espada y ataca! ",poster:null,slug:"mao",startDate:"2026-04-04",createdAt:"2026-04-04 18:17:56.938294+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59383,number:13,createdAt:"2026-06-27T22:40:44.541413+00:00"}},{id:3956,title:"Replica datte, Koi wo Suru.",synopsis:"En los días en que Sunao está enferma o no se siente con ganas de ir a la escuela, ella es llamada para tomar su lugar. Nació en este mundo cuando Sunao deseaba tener un sustituto. Nadie sabe que ella existe, pero intenta dar lo mejor de sí para Sunao siempre que es llamada. Un día, habla con Sanada, uno de sus compañeros de clase. Se hacen amigos, pero pronto él se da cuenta de que ella es diferente de la Sunao original... él fue el primero que lo notó. Ella le dice que hable con ella solo cuando tenga el cabello recogido a medias. Sanada hace lo que le dijo, y disfrutan de su tiempo juntos. A medida que se acercan, ella se da cuenta de que tiene sentimientos especiales hacia Sanada. Pero no sabe qué le pasará a ella... si una réplica se enamora. ",poster:null,slug:"replica-datte-koi-wo-suru",startDate:"2026-04-07",createdAt:"2026-04-07 12:55:59.857827+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59041,number:12,createdAt:"2026-06-23T14:50:12.895198+00:00"}},{id:3954,title:"Hidarikiki no Eren",synopsis:"La historia sigue a Koichi Asakura, un diseñador de una agencia de publicidad que trabaja mucho pero no recibe reconocimiento. Después de ser excluido de un proyecto, visita un lugar de su pasado, donde conoció a Eren Yamagishi. Eren, mientras tanto, es reconocida como una genio artista de graffiti zurda en Nueva York, mientras enfrenta las luchas que conlleva su propio camino en la vida.",poster:null,slug:"hidarikiki-no-eren",startDate:"2026-04-07",createdAt:"2026-04-07 12:47:04.711044+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59048,number:12,createdAt:"2026-06-23T16:11:19.698296+00:00"}},{id:2924,title:"Ninja to Gokudou",synopsis:"Desde tiempos antiguos, los ninja y la yakuza han estado en guerra, derramando sangre alrededor del mundo a medida que los imperios surgen y caen. Así que cuando, en la era moderna, Shinoha, un ninja, se encuentra con Kiwami, un gánster que sigue el camino de la yakuza—el gokudo—y descubre que tienen intereses comunes, la suposición obvia es que nada bueno puede surgir de ello. Pero, ¿puede ser que una creciente amistad masculina agite un rencor de 300 años?\n\n¿Quién ganará la lucha por el verdadero poder supremo? \n\n(Fuente: Kodansha USA)",poster:null,slug:"ninja-to-gokudou",startDate:"2025-10-07",createdAt:"2025-10-07 12:50:48.341509+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:48560,number:12,createdAt:"2025-12-23T18:18:01.721377+00:00"}},{id:3968,title:"Re:Zero kara Hajimeru Isekai Seikatsu 4th Season",synopsis:"En la mortal batalla en la Ciudad de Agua de Priestella, Subaru y sus aliados apenas lograron salir victoriosos, pero su triunfo tuvo un alto costo. A través de la \"Autoridad de la Glotonería\", Rem fue puesta en animación suspendida, mientras que los recuerdos de Crusch e incluso el nombre de Julius fueron devorados. Mientras busca una manera de salvarlos, Subaru se entera del \"sabio\" Shaula, un ser omnividente que se dice posee toda forma de conocimiento. Su próximo destino es la Torre de Vigilancia Pleiades, hogar de un sabio, la torre más lejana que se alza en el vasto y desconocido desierto conocido como las Dunas de Auguria, un lugar tan peligroso que incluso el más poderoso \"Santo de la Espada\", Reinhard, no logró conquistar. La furia de la naturaleza, bestias mágicas desconocidas y peligros inimaginables le esperan. Junto a sus amigos, Subaru emprende un viaje arriesgado por su vida para recuperar lo que se ha perdido. ",poster:null,slug:"rezero-kara-hajimeru-isekai-seikatsu-4th-season",startDate:"2026-04-08",createdAt:"2026-04-08 12:19:02.730623+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:58620,number:11,createdAt:"2026-06-17T14:21:13.264804+00:00"}},{id:3978,title:"Kamiina Botan, Yoeru Sugata wa Yuri no Hana",synopsis:"Esta es una historia sobre Botan Kamiina, una estudiante de primer año de universidad de 20 años, y su vida en un dormitorio, donde conoce a sus mayores y forma amistades a través de sesiones de bebida. El anime presenta muchas bebidas alcohólicas de la vida real: sake japonés, whisky, vino, y también describe música, películas y otros elementos culturales que se pueden disfrutar con alcohol. Cada bebida y pasatiempo está estrechamente ligado a las personalidades y emociones de los personajes, creando una atmósfera especial.",poster:null,slug:"kamiina-botan-yoeru-sugata-wa-yuri-no-hana",startDate:"2026-04-10",createdAt:"2026-04-10 12:25:57.107892+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59308,number:12,createdAt:"2026-06-26T16:49:13.31268+00:00"}},{id:3941,title:"Liar Game",synopsis:"La estudiante universitaria Nao Kanzaki siempre se ha adherido al significado de su nombre: \"deshonestidad tonta\". Sin embargo, después de abrir un paquete no solicitado que contiene cien millones de yenes, acepta inadvertidamente una invitación para el \"Juego del Mentiroso\". En este torneo, se anima a los concursantes a traicionar y engañar a sus oponentes para obtener una enorme suma de dinero; por el contrario, perder conlleva una deuda de por vida. Con todas sus esperanzas perdidas, su única opción es buscar ayuda de un estafador.\n\nEse mismo día, el infame timador Shinichi Akiyama es finalmente liberado de la cárcel. Este exestudiante de psicología es conocido por haber arruinado por sí solo a una empresa entera, y Nao cree que él es su única oportunidad de escapar de su situación desesperada. Al principio, Shinichi es reacio a cometer otro crimen, ignorando a Nao y su solicitud. Pero después de ver su desesperación y persistencia, acepta ayudarla.\n\nEn este mundo fraudulento, Nao y Shinichi tienen sus propios motivos. Sin embargo, pronto ven la verdadera naturaleza no solo del juego, sino también de todos los involucrados.",poster:null,slug:"liar-game",startDate:"2026-04-06",createdAt:"2026-04-06 12:15:32.821896+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:58999,number:12,createdAt:"2026-06-22T16:11:10.313869+00:00"}},{id:2901,title:"Digimon Beatbreak",synopsis:"\"e-Pulse,\" que es generado por los pensamientos y emociones humanas, se utilizó como fuente de energía para el dispositivo de apoyo de IA \"Sapotama.\" Desde las sombras de este notable desarrollo, aparecen aterradores monstruos. Los Digimon son seres vivos que evolucionan al consumir e-Pulse.\n\nTomoro Tenma se ve envuelto en una experiencia extraordinaria después de conocer a Gekkomon, quien aparece de repente de su Sapotama. Mientras vive junto a Kyo Sawashiro y otros miembros del equipo de caza recompensas \"Golden Dawn,\" Tomoro renueva su determinación. ¿Qué nuevo futuro forjarán los humanos y los Digimon?\n\n(Fuente: Sitio oficial)",poster:null,slug:"digimon-beatbreak",startDate:"2025-10-04",createdAt:"2025-10-04 14:41:21.376794+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:58852,number:36,createdAt:"2026-06-21T17:48:16.471463+00:00"}},{id:3987,title:"Kuroneko to Majo no Kyoushitsu",synopsis:"La Academia Real Diana es una prestigiosa institución que acepta a individuos con excepcionales habilidades mágicas. Al graduarse, estos estudiantes se encuentran en la cima de su campo o empleados por la familia real. Spica Virgo sueña con estudiar en la academia, con el objetivo de convertirse en una gran hechicera como su ídolo Claude Sirius. Claude es un hechicero de renombre mundial que se convirtió en el instructor más joven de la institución, pero desapareció misteriosamente poco después.\n\nCareciendo de la experiencia y las conexiones necesarias para ser admitida, Spica se siente incapaz de hacer progresos significativos en su entrenamiento. Sin embargo, un día se encuentra con un gato negro parlante con habilidades mágicas. Con la esperanza de cambiar la situación para mejor, le suplica al animal que la tome como su aprendiz y le enseñe la magia que necesita para asistir a la academia. El gato acepta el trato con una condición: debe encontrar una manera de revertir su maldición felina. A pesar de los arduos desafíos que tiene por delante, Spica está decidida a demostrar que es una estudiante digna de la mentoría del gato.",poster:null,slug:"kuroneko-to-majo-no-kyoushitsu",startDate:"2026-04-12",createdAt:"2026-04-12 10:23:38.286202+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59387,number:12,createdAt:"2026-06-28T15:13:47.856946+00:00"}},{id:3065,title:"Cengjing You Yongshi",synopsis:"El dragón adorable y contrastante, Al, el primer matador de reyes en el mundo demoníaco, que tiene un increíble historial de combate pero está listo para morir y anhela una feliz jubilación, se encuentra con el astuto mago humano Le Fei, y accidentalmente se convierte en un superpadre que cría al hijo de Le Fei, Dino. ¿Será Dino un niño ordinario y feliz, o levantará valientemente la Espada Sagrada del Guerrero y enfrentará su propio destino...?\n\n(Fuente: Bilibili, traducido)",poster:null,slug:"cengjing-you-yongshi",startDate:"2025-10-31",createdAt:"2025-10-31 11:34:19.323495+00",category:{id:3,name:"OVA"},latestEpisode:{id:48988,number:12,createdAt:"2026-01-02T05:42:12.39841+00:00"}},{id:3537,title:"Yami Shibai 16",synopsis:"Decimosexta temporada de Yami Shibai.",poster:null,slug:"yami-shibai-16",startDate:"2026-01-11",createdAt:"2026-01-11 18:28:00.836337+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:54386,number:13,createdAt:"2026-04-05T20:31:35.008798+00:00"}},{id:3998,title:"Aishiteru Game wo Owarasetai",synopsis:"En sexto grado, los amigos de la infancia Yukiya Asagi y Miku Sakura crearon un juego con el objetivo de avergonzar al otro al turno de decir \"te quiero\". Cuatro años después, incluso al entrar en la escuela secundaria, los dos siguen tratando de superar al otro y reclamar la victoria. Sin embargo, a medida que empiezan a florecer sentimientos tiernos en sus corazones, la simple frase ha adquirido un nuevo significado más allá de las reglas de su juego.\n\nCon el paso de cada día, la necesidad de ser más que amigos de la infancia crece, pero tanto Yukiya como Miku resisten hacer el primer movimiento, dudando sobre lo que les espera una vez que el juego finalmente termine. ",poster:null,slug:"aishiteru-game-wo-owarasetai",startDate:"2026-04-14",createdAt:"2026-04-14 13:33:32.10998+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:59042,number:11,createdAt:"2026-06-23T14:50:41.091717+00:00"}},{id:3933,title:"Yomi no Tsugai",synopsis:"En un pueblo aislado, nacen dos gemelos, separados por el día y la noche. Años después, mientras el hermano mayor, Yuru, se ha convertido en un cazador de animales, su hermana Asa ha sido encerrada en una jaula, obligada a cumplir un deber especial que le prohíbe interactuar con más que unos pocos individuos seleccionados.\n\nEn un día que, de otro modo, sería inconspicuo, un grupo de hombres armados que llegan en helicópteros, conocidos como \"dragones\" por los ciudadanos, asalta el pueblo en busca de Yuru, matando a todos los adultos a la vista. Cuando Yuru intenta reunirse con Asa y huir, en su lugar encuentra un cadáver; además, la persona que la mató afirma ser la verdadera hermana gemela de Yuru.\n\nAntes de que la mujer pueda capturarlo, Yuru es rescatado por un hombre llamado Dera, un forastero que visita el pueblo con frecuencia. Sin embargo, no pasa mucho tiempo antes de que ambos queden acorralados. En un último esfuerzo, Dera hace que Yuru ofrezca un regalo a la deidad del pueblo, invocando un par de demonios cuya existencia está destinada a revelar la verdad detrás de estos caóticos eventos.",poster:null,slug:"yomi-no-tsugai",startDate:"2026-04-04",createdAt:"2026-04-04 13:20:23.194252+00",category:{id:1,name:"TV Anime"},latestEpisode:{id:58777,number:12,createdAt:"2026-06-20T16:20:41.640085+00:00"}}]},uses:{}}],
